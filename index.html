async function seedIfEmpty() {
  const count = await db.medicines.count();
  if (count === 0) {
    await db.medicines.bulkAdd(SEED_MEDICINES.map(m => ({ ...m, createdAt: new Date().toISOString() })));
  }
}

const fmt = n => (n||0).toLocaleString('en-US', { maximumFractionDigits: 0 });
const fmtMoney = n => fmt(n) + ' د.ع';
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-CA') : '-';
const daysUntil = d => { if (!d) return null; const t = Math.round((new Date(d) - new Date()) / 86400000); return t; };

function checkInteractions(medicines) {
  const list = medicines.filter(Boolean);
  const warnings = [];
  for (let i = 0; i < list.length; i++) {
    for (let j = i+1; j < list.length; j++) {
      const ai = (list[i].activeIngredient || '').split(',').map(s => s.trim().toLowerCase());
      const aj = (list[j].activeIngredient || '').split(',').map(s => s.trim().toLowerCase());
      for (const ing1 of ai) for (const ing2 of aj) {
        if (!ing1 || !ing2) continue;
        const hit = SEED_INTERACTIONS.find(x =>
          (x.a === ing1 && x.b === ing2) || (x.a === ing2 && x.b === ing1)
        );
        if (hit) warnings.push({ med1: list[i], med2: list[j], ...hit });
      }
    }
  }
  const order = { severe: 0, moderate: 1, mild: 2 };
  return warnings.sort((a,b) => order[a.severity] - order[b.severity]);
}

/* ============================================================
   4) نظام التنبيهات (Toasts)
   ============================================================ */
let toastSetter = null;
function toast(msg, type='') {
  if (!toastSetter) return;
  const id = Math.random();
  toastSetter(arr => [...arr, { id, msg, type }]);
  setTimeout(() => toastSetter(arr => arr.filter(t => t.id !== id)), 2500);
}
function Toasts() {
  const [items, setItems] = useState([]);
  useEffect(() => { toastSetter = setItems; return () => toastSetter = null; }, []);
  return (
    <div className="toast-container">
      {items.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
    </div>
  );
}

/* ============================================================
   5) Hook: useLiveQuery
   ============================================================ */
function useLive(fn, deps=[]) {
  const [val, setVal] = useState([]);
  useEffect(() => {
    let alive = true;
    const run = () => Promise.resolve(fn()).then(v => { if (alive) setVal(v); });
    run();
    const handler = () => run();
    db.on('changes', handler);
    return () => { alive = false; db.on('changes').unsubscribe(handler); };
  }, deps);
  return val;
}

// Bridge: Dexie v4 emits changes via db.on('changes') when hooks are registered, but to ensure
// updates propagate reliably we also poll briefly after mutations. Simpler approach:
function useMedicines() {
  const [list, setList] = useState([]);
  const [tick, setTick] = useState(0);
  useEffect(() => { db.medicines.toArray().then(setList); }, [tick]);
  return [list, () => setTick(t => t + 1)];
}
function useSales() {
  const [list, setList] = useState([]);
  const [tick, setTick] = useState(0);
  useEffect(() => { db.sales.toArray().then(setList); }, [tick]);
  return [list, () => setTick(t => t + 1)];
}

function Dashboard() {
  const [medicines] = useMedicines();
  const [sales] = useSales();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todaySales = sales.filter(s => new Date(s.createdAt) >= todayStart);
  const todayRevenue = todaySales.reduce((s,x) => s + (x.total||0), 0);
  const todayProfit = todaySales.reduce((s,x) => s + (x.profit||0), 0);
  const totalStock = medicines.reduce((s,m) => s + (m.quantity||0), 0);
  const stockValue = medicines.reduce((s,m) => s + (m.quantity||0)*(m.purchasePrice||0), 0);
  const lowStock = medicines.filter(m => (m.quantity||0) <= 5).length;
  const expiringSoon = medicines.filter(m => { const d = daysUntil(m.expiry); return d !== null && d <= 90 && d >= 0; }).length;
  const expired = medicines.filter(m => { const d = daysUntil(m.expiry); return d !== null && d < 0; }).length;

  const Stat = ({ title, value, sub, color='brand' }) => (

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Stat title="مبيعات اليوم" value={fmtMoney(todayRevenue)} sub={`${todaySales.length} فاتورة`}/>
        <Stat title="ربح اليوم" value={fmtMoney(todayProfit)} sub="صافي"/>
        <Stat title="قيمة المخزون" value={fmtMoney(stockValue)} sub={`${totalStock} وحدة`}/>
        <Stat title="تنبيهات" value={lowStock + expiringSoon + expired} sub={`${lowStock} منخفض · ${expiringSoon} قارب · ${expired} منتهية`}/>
      </div>

      <div className="card p-5">
        <h3 className="font-bold text-slate-900 mb-4">أعلى الأدوية قيمةً في المخزون</h3>
        <div className="space-y-3">
          {top.map((t, i) => (
            <div key={i}>
              <div className="flex justify-between text-sm mb-1">
                <span className="font-medium">{t.name}</span>
                <span className="text-slate-500">{fmtMoney(t.value)}</span>
              </div>
              <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                <div className="h-full bg-brand-500 rounded-full" style={{ width: (t.value/maxVal*100) + '%' }}></div>

function POS() {
  const [meds, refreshMeds] = useMedicines();
  const [, refreshSales] = useSales();
  const [cart, setCart] = useState([]);
  const [q, setQ] = useState('');
  const [customer, setCustomer] = useState('عميل نقدي');
  const [discount, setDiscount] = useState(0);
  const [warnings, setWarnings] = useState([]);
  const [lastReceipt, setLastReceipt] = useState(null);

  useEffect(() => {
    const cartMeds = cart.map(c => meds.find(m => m.id === c.id)).filter(Boolean);
    setWarnings(checkInteractions(cartMeds));
  }, [cart, meds]);

  const add = (med) => {
    if ((med.quantity||0) <= 0) { toast('لا يوجد مخزون', 'error'); return; }
    setCart(c => {
      const ex = c.find(x => x.id === med.id);
      if (ex) {
        if (ex.qty >= med.quantity) { toast('كمية غير كافية', 'error'); return c; }
        return c.map(x => x.id === med.id ? { ...x, qty: x.qty+1 } : x);
      }
      return [...c, { id: med.id, name: med.nameAr || med.name, price: med.sellingPrice, purchase: med.purchasePrice, qty: 1, stock: med.quantity }];
    });
    setQ('');
  };
  const updateQty = (id, delta) => setCart(c => c.map(x => x.id === id ? { ...x, qty: Math.max(1, Math.min(x.stock, x.qty+delta)) } : x));
  const setQty = (id, val) => setCart(c => c.map(x => x.id === id ? { ...x, qty: Math.max(1, Math.min(x.stock, val||1)) } : x));
  const remove = (id) => setCart(c => c.filter(x => x.id !== id));

  const subtotal = cart.reduce((s,x) => s + x.price*x.qty, 0);
  const total = Math.max(0, subtotal - discount);
  const profit = cart.reduce((s,x) => s + (x.price - x.purchase)*x.qty, 0) - discount;

  const checkout = async () => {
    if (cart.length === 0) { toast('السلة فارغة', 'error'); return; }
    const severe = warnings.filter(w => w.severity === 'severe');
    if (severe.length > 0 && !confirm('توجد تضاربات خطيرة! هل تريد إتمام البيع؟')) return;

    const saleId = await db.sales.add({
      createdAt: new Date().toISOString(),
      customer, subtotal, discount, total, profit,
      items: cart.map(c => ({ id: c.id, name: c.name, price: c.price, qty: c.qty, purchase: c.purchase }))
    });
    for (const item of cart) {
      const m = meds.find(x => x.id === item.id);
      await db.medicines.update(item.id, { quantity: (m.quantity||0) - item.qty });
    }
    setLastReceipt({ id: saleId, customer, items: cart, subtotal, discount, total, date: new Date() });
    setCart([]); setDiscount(0);
    refreshMeds(); refreshSales();
    toast('تم البيع وتحديث المخزون', 'success');
  };

  const filtered = q ? meds.filter(m => {
    const s = (m.nameAr + ' ' + m.name + ' ' + m.activeIngredient + ' ' + (m.barcode||'')).toLowerCase();
    return s.includes(q.toLowerCase());
  }).slice(0, 8) : [];

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div className="lg:col-span-2 space-y-4">
        <div className="card p-4 relative">
          <input className="input" placeholder="ابحث عن دواء بالاسم أو الباركود..." value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
          {filtered.length > 0 && (
            <div className="absolute top-full right-0 left-0 mt-1 card shadow-lg z-10 max-h-80 overflow-auto">
              {filtered.map(m => (
                <button key={m.id} onClick={() => add(m)} className="w-full text-right p-3 hover:bg-slate-50 border-b last:border-0 flex justify-between items-center">
                  <div>
                    <div className="font-medium">{m.nameAr}</div>
                    <div className="text-xs text-slate-500">{m.activeIngredient} · متوفر: {m.quantity}</div>
                  </div>
                  <div className="font-bold text-brand-600">{fmtMoney(m.sellingPrice)}</div>
                </button>
              ))}
            </div>
          )}
        </div>

        {warnings.length > 0 && (
          <div className="card p-4 border-2 border-red-200 bg-red-50">
            <div className="font-bold text-red-700 mb-2">⚠ تنبيهات التضارب الدوائي ({warnings.length})</div>
            <div className="space-y-2">
              {warnings.map((w, i) => (
                <div key={i} className={`p-2 rounded border ${severityInfo[w.severity].color}`}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="badge" style={{background:'rgba(0,0,0,.08)'}}>{severityInfo[w.severity].label}</span>
                    <span className="font-bold text-sm">{w.med1.nameAr} + {w.med2.nameAr}</span>
                  </div>
                  <div className="text-xs">{w.mechanism}</div>
                  <div className="text-xs font-medium mt-1">التوصية: {w.note}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="card overflow-auto">
          <table className="table-base">
            <thead><tr><th>الدواء</th><th>السعر</th><th>الكمية</th><th>المجموع</th><th></th></tr></thead>
            <tbody>
              {cart.length === 0 && <tr><td colSpan={5} className="text-center text-slate-400 py-8">السلة فارغة</td></tr>}
              {cart.map(item => (
                <tr key={item.id}>
                  <td className="font-medium">{item.name}</td>
                  <td>{fmtMoney(item.price)}</td>
                  <td>
                    <div className="flex items-center gap-1">
                      <button onClick={() => updateQty(item.id, -1)} className="btn btn-ghost w-7 h-7 !p-0">-</button>
                      <input type="number" value={item.qty} onChange={e=>setQty(item.id, +e.target.value)} className="input w-14 text-center"/>
                      <button onClick={() => updateQty(item.id, +1)} className="btn btn-ghost w-7 h-7 !p-0">+</button>
                    </div>
                  </td>
                  <td className="font-semibold">{fmtMoney(item.price*item.qty)}</td>
                  <td><button onClick={() => remove(item.id)} className="btn btn-danger text-xs">حذف</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card p-5 h-fit sticky top-4">
        <h3 className="font-bold mb-4">ملخص الفاتورة</h3>
        <label className="block mb-3">
          <div className="text-xs text-slate-500 mb-1">العميل</div>
          <input className="input" value={customer} onChange={e=>setCustomer(e.target.value)}/>
        </label>
        <label className="block mb-4">
          <div className="text-xs text-slate-500 mb-1">خصم</div>
          <input type="number" className="input" value={discount} onChange={e=>setDiscount(+e.target.value||0)}/>
        </label>
        <div className="space-y-2 text-sm pb-3 border-b">
          <div className="flex justify-between"><span>المجموع الفرعي:</span><span>{fmtMoney(subtotal)}</span></div>
          <div className="flex justify-between"><span>خصم:</span><span>- {fmtMoney(discount)}</span></div>
          <div className="flex justify-between text-lg font-bold pt-2"><span>الإجمالي:</span><span className="text-brand-600">{fmtMoney(total)}</span></div>
          <div className="flex justify-between text-xs text-slate-500"><span>ربح متوقع:</span><span>{fmtMoney(profit)}</span></div>
        </div>
        <button onClick={checkout} disabled={cart.length === 0} className="btn btn-primary w-full mt-4 disabled:opacity-50">إتمام البيع</button>
      </div>

      {lastReceipt && <ReceiptModal r={lastReceipt} onClose={() => setLastReceipt(null)}/>}
    </div>
  );
}

function Expiry() {
  const [meds] = useMedicines();
  const [filter, setFilter] = useState('soon');
  const cat = useMemo(() => {
    const expired = [], soon = [], low = [];
    for (const m of meds) {
      const d = daysUntil(m.expiry);
      if (d !== null && d < 0) expired.push({ ...m, days: d });
      else if (d !== null && d <= 90) soon.push({ ...m, days: d });
      if ((m.quantity||0) <= 5) low.push(m);
    }
    return { expired, soon: soon.sort((a,b) => a.days - b.days), low };
  }, [meds]);
  const loss = cat.expired.reduce((s,m) => s + (m.quantity||0)*(m.purchasePrice||0), 0);
  const list = cat[filter];

  const Btn = ({ k, count, label, sub }) => (
    <button onClick={() => setFilter(k)} className={`card p-5 text-right transition ${filter === k ? 'ring-2 ring-brand-300' : ''}`}>
      <div className="text-2xl font-bold">{count}</div>
      <div className="text-sm text-slate-600 mt-2">{label}</div>
      {sub && <div className="text-xs text-red-600 mt-1">{sub}</div>}
    </button>
  );

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <Btn k="soon" count={cat.soon.length} label="قاربت على الانتهاء (≤90 يوم)"/>
        <Btn k="expired" count={cat.expired.length} label="منتهية الصلاحية" sub={loss > 0 ? 'قيمة الفاقد: ' + fmtMoney(loss) : null}/>
        <Btn k="low" count={cat.low.length} label="مخزون منخفض (≤5)"/>
      </div>
      <div className="card overflow-auto">
        <table className="table-base">
          <thead><tr><th>الاسم</th><th>الكمية</th><th>الصلاحية</th><th>المتبقي</th><th>القيمة</th></tr></thead>
          <tbody>
            {list.length === 0 && <tr><td colSpan={5} className="text-center text-slate-400 py-8">لا توجد أصناف</td></tr>}
            {list.map(m => {
              const d = daysUntil(m.expiry);
              return (
                <tr key={m.id} className={d !== null && d < 0 ? 'bg-red-50' : ''}>
                  <td className="font-medium">{m.nameAr}</td>
                  <td>{m.quantity}</td>
                  <td>{fmtDate(m.expiry)}</td>
                  <td className={d !== null && d < 0 ? 'text-red-600 font-bold' : 'text-amber-600'}>
                    {d === null ? '-' : d < 0 ? `منتهية منذ ${Math.abs(d)} يوم` : `${d} يوم`}
                  </td>
                  <td className="font-semibold">{fmtMoney((m.quantity||0)*(m.purchasePrice||0))}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

   المساعد الذكي — ChatGPT مجاني (Puter.js) + Claude (Cloudflare)

const PH_SYSTEM_PROMPT = `أنت مساعد صيدلاني ذكي يساعد الصيدلي العراقي.
- الإجابة مختصرة، دقيقة، مهنية.
- استخدم اللهجة العراقية عند السؤال باللهجة، والفصحى عند السؤال بالفصحى.
- عند ذكر جرعة: اذكر جرعة البالغ والطفل إن أمكن مع التحذيرات.
- عند ذكر تضارب: الآلية + الشدة (خطير/متوسط/خفيف) + التوصية.
- لا تقدم تشخيصاً قطعياً. ذكّر بمراجعة الطبيب في الحالات المعقدة.
- استخدم الأسماء العلمية والتجارية معاً لو ممكن.`;

function Assistant() {
  // provider: 'chatgpt' (مجاني — Puter.js) | 'claude' (عبر /api/chat على Cloudflare)
  const [provider, setProvider] = useState(() => localStorage.getItem('ph_provider') || 'chatgpt');
  const [model, setModel] = useState(() => localStorage.getItem('ph_model') || 'gpt-4o-mini');
  const [messages, setMessages] = useState([
    { role: 'assistant', content: 'أهلاً! أنا مساعدك الصيدلاني. اسألني عن جرعة دواء، تفاعلات، أعراض جانبية، أو نصائح لحالات شائعة. بلهجتك المحلية أو الفصحى.' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);
  useEffect(() => { localStorage.setItem('ph_provider', provider); }, [provider]);
  useEffect(() => { localStorage.setItem('ph_model', model); }, [model]);

  const sendViaPuter = async (history) => {
    if (typeof puter === 'undefined' || !puter?.ai?.chat) {
      throw new Error('مكتبة Puter لم تُحمَّل. تأكد من اتصال الإنترنت.');
    }
    // Puter يدعم مصفوفة رسائل بنفس صيغة OpenAI + system
    const puterMessages = [
      { role: 'system', content: PH_SYSTEM_PROMPT },
      ...history.map(m => ({ role: m.role, content: String(m.content || '') }))
    ];
    const res = await puter.ai.chat(puterMessages, { model });
    // Puter يرجع نص أو كائن فيه message.content
    if (typeof res === 'string') return res;
    if (res?.message?.content) {
      const c = res.message.content;
      if (Array.isArray(c)) return c.map(x => x.text || '').join('\n').trim();
      return String(c);
    }
    return String(res || '').trim();
  };

  const sendViaClaude = async (history) => {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.map(m => ({ role: m.role, content: m.content })) })
    });
    const ct = res.headers.get('content-type') || '';
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText.slice(0, 200) || ('HTTP ' + res.status));
    }
    if (!ct.includes('json')) {
      throw new Error('Claude غير مفعّل. استخدم ChatGPT المجاني أو انشر النظام على Cloudflare مع ANTHROPIC_API_KEY.');
    }
    const data = await res.json();
    return data.content || data.reply || data.message || '';
  };

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    const newMessages = [...messages, { role: 'user', content: text }];
    setMessages(newMessages); setInput(''); setLoading(true);
    try {
      const reply = provider === 'claude'
        ? await sendViaClaude(newMessages)
        : await sendViaPuter(newMessages);
      setMessages(m => [...m, { role: 'assistant', content: reply || 'لم أستطع توليد رد.' }]);
    } catch (err) {
      setMessages(m => [...m, { role: 'assistant', content: '⚠ ' + (err?.message || err), error: true }]);
    } finally {
      setLoading(false);
    }
  };

  const clearChat = () => setMessages([{ role: 'assistant', content: 'بدأنا محادثة جديدة. شنو سؤالك؟' }]);

  const examples = [
    'شنو جرعة باراسيتامول للطفل عمره 5 سنين؟',
    'هل ممكن آخذ بروفين ويا وارفارين؟',
    'مريض يشتكي من حرقة معدة، شنو تنصح؟',
    'ما الفرق بين أموكسيسيلين وأزيثرومايسين؟'
  ];

  const PUTER_MODELS = [
    { v:'gpt-4o-mini',        l:'GPT-4o mini (سريع · مجاني)' },
    { v:'gpt-4o',             l:'GPT-4o (أدق · مجاني)' },
    { v:'gpt-5-nano',         l:'GPT-5 nano (تجريبي)' },
    { v:'o1-mini',            l:'o1-mini (تفكير · مجاني)' },
    { v:'claude-sonnet-4',    l:'Claude Sonnet 4 (مجاني عبر Puter)' },
    { v:'google/gemini-2.0-flash-lite-001', l:'Gemini 2.0 Flash (مجاني)' },
    { v:'deepseek-chat',      l:'DeepSeek Chat (مجاني)' },
  ];

  return (
    <div className="card h-[78vh] flex flex-col">
      <div className="p-4 border-b flex flex-wrap items-center justify-between gap-3">
        <div>
          <h3 className="font-bold">المساعد الصيدلاني الذكي</h3>
          <div className="text-xs text-slate-500">
            {provider === 'chatgpt' ? 'ChatGPT مجاني عبر Puter.js — بدون مفتاح API' : 'Claude عبر Cloudflare Function'}
          </div>
        </div>
        <div className="flex items-center gap-2">
          <select value={provider} onChange={e=>setProvider(e.target.value)} className="input text-xs py-1.5 w-auto">
            <option value="chatgpt">ChatGPT مجاني (Puter)</option>
            <option value="claude">Claude (مفتاحي الخاص)</option>
          </select>
          {provider === 'chatgpt' && (
            <select value={model} onChange={e=>setModel(e.target.value)} className="input text-xs py-1.5 w-auto">
              {PUTER_MODELS.map(m => <option key={m.v} value={m.v}>{m.l}</option>)}
            </select>
          )}
          <button onClick={clearChat} className="btn btn-ghost text-xs py-1.5">مسح</button>
        </div>
      </div>

      {provider === 'chatgpt' && (
        <div className="px-4 py-2 bg-emerald-50 border-b border-emerald-100 text-xs text-emerald-800">
          💡 أول مرة تسأل فيها، ممكن Puter يطلب تسجيل دخول سريع (مجاناً) — بعدها الاستعمال مباشر وبلا مفاتيح API.
        </div>
      )}

      <div className="flex-1 overflow-auto p-4 space-y-3">
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.role === 'user' ? 'justify-start' : 'justify-end'}`}>
            <div className={`max-w-[85%] p-3 rounded-xl whitespace-pre-wrap text-sm ${
              m.role === 'user' ? 'bg-brand-600 text-white' :
              m.error ? 'bg-red-50 text-red-700 border border-red-200' :
              'bg-slate-100 text-slate-800'
            }`}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div className="flex justify-end">
            <div className="bg-slate-100 p-3 rounded-xl text-sm text-slate-400">جاري التفكير...</div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {messages.length <= 1 && (
        <div className="px-4 pb-2 flex flex-wrap gap-2">
          {examples.map((ex, i) => (
            <button key={i} onClick={() => setInput(ex)} className="text-xs px-3 py-1.5 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600">
              {ex}
            </button>
          ))}
        </div>
      )}

      <div className="p-3 border-t flex gap-2">
        <input
          className="input flex-1"
          placeholder="اكتب سؤالك..."
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          disabled={loading}
        />
        <button onClick={send} disabled={loading || !input.trim()} className="btn btn-primary disabled:opacity-50">
          إرسال
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   CSV parser — خفيف، يدعم Quoted fields والفواصل الداخلية
   ============================================================ */
function parseCSV(text) {
  // تجاهل BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const rows = [];
  let row = [], field = '', i = 0, inQuotes = false;
  while (i < text.length) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += c; i++; continue;
    }
    if (c === '"') { inQuotes = true; i++; continue; }
    if (c === ',') { row.push(field); field=''; i++; continue; }
    if (c === '\r') { i++; continue; }
    if (c === '\n') { row.push(field); rows.push(row); row=[]; field=''; i++; continue; }
    field += c; i++;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0].trim() !== ''));
}

    ].map(esc).join(','));

  const importData = (e) => {

        if (data.sales) await db.sales.bulkAdd(data.sales.map(s => { const { id, ...rest } = s; return rest; }));

  const importMedicinesCSV = async (e) => {

      const idx = {
        nameAr: header.indexOf('nameAr'),
        name: header.indexOf('name'),
        activeIngredient: header.indexOf('activeIngredient'),
        category: header.indexOf('category'),
        form: header.indexOf('form'),

        barcode: header.indexOf('barcode'),

        sellingPrice: header.indexOf('sellingPrice'),

      };

        toast('العناوين خاطئة. حمّل القالب واتبع نفس الأعمدة.', 'error');
        setImporting(false); return;

      if (mode === false) {
        await db.medicines.clear();

      // Index موجود: باركود → id، والاسم الإنجليزي → id (للمطابقة السريعة)

      if (mode === true) {

        existing.forEach(m => {
          if (m.barcode) barcodeMap.set(String(m.barcode).trim(), m.id);
          if (m.name) nameMap.set(String(m.name).trim().toLowerCase(), m.id);
        });
      }

      const CHUNK = 500;
      let added = 0, updated = 0, skipped = 0;
      setProgress({ done: 0, total: dataRows.length, added: 0, updated: 0, skipped: 0 });

      // تحويل الصفوف لكائنات
      const normalize = (r) => {
        const g = (k) => idx[k] >= 0 ? String(r[idx[k]] || '').trim() : '';
        const num = (k) => { const v = parseFloat(g(k)); return isNaN(v) ? 0 : v; };
        const int = (k) => { const v = parseInt(g(k),10); return isNaN(v) ? 0 : v; };
        return {
          nameAr: g('nameAr') || g('name'),
          name: g('name') || g('nameAr'),
          activeIngredient: g('activeIngredient').toLowerCase(),
          category: g('category') || 'عام',
          form: g('form') || 'حبة',
          strength: g('strength'),
          barcode: g('barcode'),
          purchasePrice: num('purchasePrice'),
          sellingPrice: num('sellingPrice'),
          quantity: int('quantity'),
          expiry: g('expiry')
        };
      };

      for (let i = 0; i < dataRows.length; i += CHUNK) {
        const slice = dataRows.slice(i, i + CHUNK);
        const toAdd = [], toUpdate = [];
        for (const r of slice) {
          const m = normalize(r);
          if (!m.name && !m.nameAr) { skipped++; continue; }
          if (mode === true) {
            let existingId = null;
            if (m.barcode && barcodeMap.has(m.barcode)) existingId = barcodeMap.get(m.barcode);
            else if (m.name && nameMap.has(m.name.toLowerCase())) existingId = nameMap.get(m.name.toLowerCase());
            if (existingId) {
              toUpdate.push({ id: existingId, changes: m });
            } else {
              toAdd.push(m);
            }
          } else {
            toAdd.push(m);
          }
        }
        if (toAdd.length) {
          const ids = await db.medicines.bulkAdd(toAdd, { allKeys: true }).catch(() => null);
          added += toAdd.length;
          // حدث الخرائط للمجموعات التالية
          if (mode === true && ids && ids.length === toAdd.length) {
            toAdd.forEach((m, j) => {
              if (m.barcode) barcodeMap.set(m.barcode, ids[j]);
              if (m.name) nameMap.set(m.name.toLowerCase(), ids[j]);
            });
          }
        }
        if (toUpdate.length) {
          await db.transaction('rw', db.medicines, async () => {
            for (const u of toUpdate) await db.medicines.update(u.id, u.changes);
          });
          updated += toUpdate.length;
        }
        setProgress({ done: Math.min(i + CHUNK, dataRows.length), total: dataRows.length, added, updated, skipped });
        await new Promise(r => setTimeout(r, 0));
      }

      setImporting(false);
      toast(`تم: ${added} مضاف · ${updated} محدّث · ${skipped} متخطّى`, 'success');
    } catch (err) {
      setImporting(false);
      toast('خطأ في الاستيراد: ' + (err?.message || err), 'error');
    }
    e.target.value = '';
  };

  const reset = async () => {
    if (!confirm('حذف كل البيانات وإعادة التشغيل؟')) return;
    await db.medicines.clear(); await db.sales.clear(); await db.saleItems.clear();
    location.reload();
  };

  return (
    <div className="space-y-4 max-w-3xl">
      <div className="card p-5">
        <h3 className="font-bold mb-1">استيراد جماعي للأدوية (CSV) — حتى 10,000 دواء</h3>
        <p className="text-xs text-slate-500 mb-3">
          أعمدة الملف: <code className="bg-slate-100 px-1 rounded">nameAr, name, activeIngredient, category, form, strength, barcode, purchasePrice, sellingPrice, quantity, expiry</code>
        </p>
        <div className="flex gap-2 flex-wrap">
          <button onClick={downloadTemplate} className="btn btn-ghost">⬇ تنزيل القالب</button>
          <label className={`btn btn-primary cursor-pointer ${importing ? 'opacity-50 pointer-events-none' : ''}`}>
            {importing ? 'جاري الاستيراد...' : '📥 استيراد CSV'}
            <input type="file" accept=".csv,text/csv" className="hidden" onChange={importMedicinesCSV} disabled={importing}/>
          </label>
          <button onClick={exportMedicinesCSV} className="btn btn-ghost">⬆ تصدير CSV</button>
        </div>
        {importing && progress.total > 0 && (
          <div className="mt-4">
            <div className="flex justify-between text-xs text-slate-500 mb-1">
              <span>{progress.done} / {progress.total}</span>
              <span>{Math.round(progress.done / progress.total * 100)}%</span>
            </div>
            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div className="h-full bg-brand-500 transition-all" style={{ width: (progress.done/progress.total*100)+'%' }}/>
            </div>
            <div className="text-xs text-slate-500 mt-2">
              مضاف: {progress.added} · محدّث: {progress.updated} · متخطّى: {progress.skipped}
            </div>
          </div>
        )}
        <details className="mt-4 text-xs text-slate-500">
          <summary className="cursor-pointer hover:text-slate-700">كيف أحضّر ملف 10,000 دواء؟</summary>
          <ol className="mt-2 pr-5 list-decimal space-y-1">
            <li>اضغط "تنزيل القالب" لفتحه في Excel أو Google Sheets.</li>
            <li>املأ الصفوف — كل سطر دواء. الصيغة <b>UTF-8</b>.</li>
            <li>احفظ كـ <b>CSV (Comma delimited)</b>.</li>
            <li>ارجع هنا واضغط "استيراد CSV".</li>
            <li>اختر <b>OK</b> لإضافة/تحديث (حسب الباركود أو الاسم)، أو <b>Cancel</b> لاستبدال الجدول بالكامل.</li>
            <li>تاريخ الصلاحية بصيغة <code>YYYY-MM-DD</code> مثل <code>2027-06-30</code>.</li>
            <li>الأسعار والكميات أرقام فقط (بدون فواصل أو عملة).</li>
          </ol>
        </details>
      </div>

      <div className="card p-5">
        <h3 className="font-bold mb-3">النسخ الاحتياطي الكامل (JSON)</h3>
        <p className="text-xs text-slate-500 mb-3">يشمل الأدوية + المبيعات + الفواتير. استخدمه قبل أي تغيير كبير.</p>
        <div className="flex gap-2 flex-wrap">
          <button onClick={exportData} className="btn btn-primary">تصدير JSON</button>
          <label className="btn btn-ghost cursor-pointer">
            استيراد JSON
            <input type="file" accept=".json" className="hidden" onChange={importData}/>
          </label>
          <button onClick={reset} className="btn btn-danger">إعادة تعيين كاملة</button>
        </div>
      </div>

      <div className="card p-5">
        <h3 className="font-bold mb-3">المساعد الذكي</h3>
        <div className="text-sm text-slate-600 space-y-2">
          <p><b>ChatGPT مجاني:</b> يعمل مباشرة عبر Puter.js — بدون مفتاح API. أول استعمال يطلب تسجيل دخول Puter المجاني.</p>
          <p><b>Claude (اختياري):</b> لاستعماله بمفتاحك الخاص، انشر النظام على Cloudflare Pages وأضف <code className="bg-slate-100 px-1 rounded">ANTHROPIC_API_KEY</code> في Environment variables، ثم اختر "Claude" من تبويب المساعد.</p>
        </div>
      </div>

      <div className="card p-5">
        <div className="text-xs text-slate-400">
          ⚠ إخلاء مسؤولية طبي: هذا النظام أداة مساعدة فقط. القرار الصيدلاني النهائي مسؤولية الصيدلي المرخّص.
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   7) التطبيق الرئيسي
   ============================================================ */
const TABS = [
  { k: 'dashboard',    label: 'لوحة التحكم',    icon: '📊' },
  { k: 'pos',          label: 'نقطة البيع',     icon: '💊' },
  { k: 'medicines',    label: 'الأدوية',        icon: '📦' },
  { k: 'sales',        label: 'المبيعات',       icon: '💰' },
  { k: 'expiry',       label: 'الصلاحية',       icon: '⏰' },
  { k: 'interactions', label: 'التضارب الدوائي', icon: '⚠' },
  { k: 'assistant',    label: 'المساعد الذكي',  icon: '🤖' },
  { k: 'settings',     label: 'الإعدادات',      icon: '⚙' },
];

function App() {
  const [tab, setTab] = useState('dashboard');
  const [ready, setReady] = useState(false);

  useEffect(() => { seedIfEmpty().then(() => setReady(true)); }, []);

  if (!ready) return <div className="min-h-screen flex items-center justify-center text-slate-500">جاري تحميل البيانات...</div>;

  const Page = { dashboard: Dashboard, pos: POS, medicines: Medicines, sales: Sales, expiry: Expiry, interactions: Interactions, assistant: Assistant, settings: Settings }[tab];

  return (
    <div className="min-h-screen">
      <Toasts/>
      <header className="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-brand-600 text-white flex items-center justify-center text-xl font-bold">ص</div>
          <div>
            <h1 className="font-bold text-slate-900">نظام الصيدلية الذكي</h1>
            <div className="text-xs text-slate-500">نسخة الإنتاج · يعمل أونلاين وأوفلاين</div>
          </div>
        </div>
      </header>

      <nav className="bg-white border-b border-slate-200 sticky top-[69px] z-10 overflow-x-auto">
        <div className="max-w-7xl mx-auto px-4 py-2 flex gap-1">
          {TABS.map(t => (
            <button key={t.k} onClick={() => setTab(t.k)} className={`tab whitespace-nowrap ${tab === t.k ? 'active' : ''}`}>
              <span className="ml-1">{t.icon}</span>{t.label}
            </button>
          ))}
        </div>
      </nav>

      <main className="max-w-7xl mx-auto px-4 py-6">
        <Page/>
      </main>

      <footer className="text-center text-xs text-slate-400 py-6">
        نظام الصيدلية الذكي · مساعد ChatGPT مجاني · {SEED_INTERACTIONS.length} تفاعل دوائي مدمج
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
