async function seedIfEmpty() {
  const count = await db.medicines.count();
  if (count === 0) {
    await db.medicines.bulkAdd(SEED_MEDICINES.map(m => ({ ...m, createdAt: new Date().toISOString() })));
  }
}

const fmt = n => (n||0).toLocaleString('en-US', { maximumFractionDigits: 0 });
const fmtMoney = n => fmt(n) + ' د.ع';
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-CA') : '-';
const daysUntil = d => { if (!d) return null; const t = Math.round((new Date(d) - new Date()) / 86400000); return t; };

function checkInteractions(medicines) {
  const list = medicines.filter(Boolean);
  const warnings = [];
  for (let i = 0; i < list.length; i++) {
    for (let j = i+1; j < list.length; j++) {
      const ai = (list[i].activeIngredient || '').split(',').map(s => s.trim().toLowerCase());
      const aj = (list[j].activeIngredient || '').split(',').map(s => s.trim().toLowerCase());
      for (const ing1 of ai) for (const ing2 of aj) {
        if (!ing1 || !ing2) continue;
        const hit = SEED_INTERACTIONS.find(x =>
          (x.a === ing1 && x.b === ing2) || (x.a === ing2 && x.b === ing1)
        );
        if (hit) warnings.push({ med1: list[i], med2: list[j], ...hit });
      }
    }
  }
  const order = { severe: 0, moderate: 1, mild: 2 };
  return warnings.sort((a,b) => order[a.severity] - order[b.severity]);
}

};

/* ============================================================
   4) نظام التنبيهات (Toasts)
   ============================================================ */
let toastSetter = null;
function toast(msg, type='') {
  if (!toastSetter) return;
  const id = Math.random();
  toastSetter(arr => [...arr, { id, msg, type }]);
  setTimeout(() => toastSetter(arr => arr.filter(t => t.id !== id)), 2500);
}
function Toasts() {
  const [items, setItems] = useState([]);
  useEffect(() => { toastSetter = setItems; return () => toastSetter = null; }, []);
  return (
    <div className="toast-container">
      {items.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
    </div>
  );
}

/* ============================================================
   5) Hook: useLiveQuery
   ============================================================ */
function useLive(fn, deps=[]) {
  const [val, setVal] = useState([]);
  useEffect(() => {
    let alive = true;
    const run = () => Promise.resolve(fn()).then(v => { if (alive) setVal(v); });
    run();
    const handler = () => run();
    db.on('changes', handler);
    return () => { alive = false; db.on('changes').unsubscribe(handler); };
  }, deps);
  return val;
}

// Bridge: Dexie v4 emits changes via db.on('changes') when hooks are registered, but to ensure
// updates propagate reliably we also poll briefly after mutations. Simpler approach:
function useMedicines() {
  const [list, setList] = useState([]);
  const [tick, setTick] = useState(0);
  useEffect(() => { db.medicines.toArray().then(setList); }, [tick]);
  return [list, () => setTick(t => t + 1)];
}
function useSales() {
  const [list, setList] = useState([]);
  const [tick, setTick] = useState(0);
  useEffect(() => { db.sales.toArray().then(setList); }, [tick]);
  return [list, () => setTick(t => t + 1)];
}

function POS() {
  const [meds, refreshMeds] = useMedicines();
  const [, refreshSales] = useSales();
  const [cart, setCart] = useState([]);
  const [q, setQ] = useState('');
  const [customer, setCustomer] = useState('عميل نقدي');
  const [discount, setDiscount] = useState(0);
  const [warnings, setWarnings] = useState([]);
  const [lastReceipt, setLastReceipt] = useState(null);

  useEffect(() => {
    const cartMeds = cart.map(c => meds.find(m => m.id === c.id)).filter(Boolean);
    setWarnings(checkInteractions(cartMeds));
  }, [cart, meds]);

  const add = (med) => {
    if ((med.quantity||0) <= 0) { toast('لا يوجد مخزون', 'error'); return; }
    setCart(c => {
      const ex = c.find(x => x.id === med.id);
      if (ex) {
        if (ex.qty >= med.quantity) { toast('كمية غير كافية', 'error'); return c; }
        return c.map(x => x.id === med.id ? { ...x, qty: x.qty+1 } : x);
      }
      return [...c, { id: med.id, name: med.nameAr || med.name, price: med.sellingPrice, purchase: med.purchasePrice, qty: 1, stock: med.quantity }];
    });
    setQ('');
  };
  const updateQty = (id, delta) => setCart(c => c.map(x => x.id === id ? { ...x, qty: Math.max(1, Math.min(x.stock, x.qty+delta)) } : x));
  const setQty = (id, val) => setCart(c => c.map(x => x.id === id ? { ...x, qty: Math.max(1, Math.min(x.stock, val||1)) } : x));
  const remove = (id) => setCart(c => c.filter(x => x.id !== id));

  const subtotal = cart.reduce((s,x) => s + x.price*x.qty, 0);
  const total = Math.max(0, subtotal - discount);
  const profit = cart.reduce((s,x) => s + (x.price - x.purchase)*x.qty, 0) - discount;

  const checkout = async () => {
    if (cart.length === 0) { toast('السلة فارغة', 'error'); return; }
    const severe = warnings.filter(w => w.severity === 'severe');
    if (severe.length > 0 && !confirm('توجد تضاربات خطيرة! هل تريد إتمام البيع؟')) return;

    const saleId = await db.sales.add({
      createdAt: new Date().toISOString(),
      customer, subtotal, discount, total, profit,
      items: cart.map(c => ({ id: c.id, name: c.name, price: c.price, qty: c.qty, purchase: c.purchase }))
    });
    for (const item of cart) {
      const m = meds.find(x => x.id === item.id);
      await db.medicines.update(item.id, { quantity: (m.quantity||0) - item.qty });
    }
    setLastReceipt({ id: saleId, customer, items: cart, subtotal, discount, total, date: new Date() });
    setCart([]); setDiscount(0);
    refreshMeds(); refreshSales();
    toast('تم البيع وتحديث المخزون', 'success');
  };

  const filtered = q ? meds.filter(m => {
    const s = (m.nameAr + ' ' + m.name + ' ' + m.activeIngredient + ' ' + (m.barcode||'')).toLowerCase();
    return s.includes(q.toLowerCase());
  }).slice(0, 8) : [];

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div className="lg:col-span-2 space-y-4">
        <div className="card p-4 relative">
          <input className="input" placeholder="ابحث عن دواء بالاسم أو الباركود..." value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
          {filtered.length > 0 && (
            <div className="absolute top-full right-0 left-0 mt-1 card shadow-lg z-10 max-h-80 overflow-auto">
              {filtered.map(m => (
                <button key={m.id} onClick={() => add(m)} className="w-full text-right p-3 hover:bg-slate-50 border-b last:border-0 flex justify-between items-center">
                  <div>
                    <div className="font-medium">{m.nameAr}</div>
                    <div className="text-xs text-slate-500">{m.activeIngredient} · متوفر: {m.quantity}</div>
                  </div>
                  <div className="font-bold text-brand-600">{fmtMoney(m.sellingPrice)}</div>
                </button>
              ))}
            </div>
          )}
        </div>

        {warnings.length > 0 && (
          <div className="card p-4 border-2 border-red-200 bg-red-50">
            <div className="font-bold text-red-700 mb-2">⚠ تنبيهات التضارب الدوائي ({warnings.length})</div>
            <div className="space-y-2">
              {warnings.map((w, i) => (
                <div key={i} className={`p-2 rounded border ${severityInfo[w.severity].color}`}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="badge" style={{background:'rgba(0,0,0,.08)'}}>{severityInfo[w.severity].label}</span>
                    <span className="font-bold text-sm">{w.med1.nameAr} + {w.med2.nameAr}</span>
                  </div>
                  <div className="text-xs">{w.mechanism}</div>
                  <div className="text-xs font-medium mt-1">التوصية: {w.note}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="card overflow-auto">
          <table className="table-base">
            <thead><tr><th>الدواء</th><th>السعر</th><th>الكمية</th><th>المجموع</th><th></th></tr></thead>
            <tbody>
              {cart.length === 0 && <tr><td colSpan={5} className="text-center text-slate-400 py-8">السلة فارغة</td></tr>}
              {cart.map(item => (
                <tr key={item.id}>
                  <td className="font-medium">{item.name}</td>
                  <td>{fmtMoney(item.price)}</td>
                  <td>
                    <div className="flex items-center gap-1">
                      <button onClick={() => updateQty(item.id, -1)} className="btn btn-ghost w-7 h-7 !p-0">-</button>
                      <input type="number" value={item.qty} onChange={e=>setQty(item.id, +e.target.value)} className="input w-14 text-center"/>
                      <button onClick={() => updateQty(item.id, +1)} className="btn btn-ghost w-7 h-7 !p-0">+</button>
                    </div>
                  </td>
                  <td className="font-semibold">{fmtMoney(item.price*item.qty)}</td>
                  <td><button onClick={() => remove(item.id)} className="btn btn-danger text-xs">حذف</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card p-5 h-fit sticky top-4">
        <h3 className="font-bold mb-4">ملخص الفاتورة</h3>
        <label className="block mb-3">
          <div className="text-xs text-slate-500 mb-1">العميل</div>
          <input className="input" value={customer} onChange={e=>setCustomer(e.target.value)}/>
        </label>
        <label className="block mb-4">
          <div className="text-xs text-slate-500 mb-1">خصم</div>
          <input type="number" className="input" value={discount} onChange={e=>setDiscount(+e.target.value||0)}/>
        </label>
        <div className="space-y-2 text-sm pb-3 border-b">
          <div className="flex justify-between"><span>المجموع الفرعي:</span><span>{fmtMoney(subtotal)}</span></div>
          <div className="flex justify-between"><span>خصم:</span><span>- {fmtMoney(discount)}</span></div>
          <div className="flex justify-between text-lg font-bold pt-2"><span>الإجمالي:</span><span className="text-brand-600">{fmtMoney(total)}</span></div>
          <div className="flex justify-between text-xs text-slate-500"><span>ربح متوقع:</span><span>{fmtMoney(profit)}</span></div>
        </div>
        <button onClick={checkout} disabled={cart.length === 0} className="btn btn-primary w-full mt-4 disabled:opacity-50">إتمام البيع</button>
      </div>

      {lastReceipt && <ReceiptModal r={lastReceipt} onClose={() => setLastReceipt(null)}/>}
    </div>
  );
}

        <div className="flex justify-between text-sm"><span>المجموع الفرعي:</span><span>{fmtMoney(r.subtotal)}</span></div>
        <div className="flex justify-between text-sm"><span>خصم:</span><span>- {fmtMoney(r.discount)}</span></div>
        <div className="flex justify-between font-bold text-lg pt-2 border-t mt-2"><span>الإجمالي:</span><span>{fmtMoney(r.total)}</span></div>
        <div className="text-center text-xs text-slate-400 mt-4">شكراً لتسوقكم معنا</div>
        <div className="flex gap-2 mt-5 no-print">
          <button onClick={() => window.print()} className="btn btn-primary flex-1">طباعة</button>
          <button onClick={onClose} className="btn btn-ghost flex-1">إغلاق</button>
        </div>
      </div>
    </div>
  );
}

function Expiry() {
  const [meds] = useMedicines();
  const [filter, setFilter] = useState('soon');
  const cat = useMemo(() => {
    const expired = [], soon = [], low = [];
    for (const m of meds) {
      const d = daysUntil(m.expiry);
      if (d !== null && d < 0) expired.push({ ...m, days: d });
      else if (d !== null && d <= 90) soon.push({ ...m, days: d });
      if ((m.quantity||0) <= 5) low.push(m);
    }
    return { expired, soon: soon.sort((a,b) => a.days - b.days), low };
  }, [meds]);
  const loss = cat.expired.reduce((s,m) => s + (m.quantity||0)*(m.purchasePrice||0), 0);
  const list = cat[filter];

  const Btn = ({ k, count, label, sub }) => (
    <button onClick={() => setFilter(k)} className={`card p-5 text-right transition ${filter === k ? 'ring-2 ring-brand-300' : ''}`}>
      <div className="text-2xl font-bold">{count}</div>
      <div className="text-sm text-slate-600 mt-2">{label}</div>
      {sub && <div className="text-xs text-red-600 mt-1">{sub}</div>}
    </button>
  );

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <Btn k="soon" count={cat.soon.length} label="قاربت على الانتهاء (≤90 يوم)"/>
        <Btn k="expired" count={cat.expired.length} label="منتهية الصلاحية" sub={loss > 0 ? 'قيمة الفاقد: ' + fmtMoney(loss) : null}/>
        <Btn k="low" count={cat.low.length} label="مخزون منخفض (≤5)"/>
      </div>
      <div className="card overflow-auto">
        <table className="table-base">
          <thead><tr><th>الاسم</th><th>الكمية</th><th>الصلاحية</th><th>المتبقي</th><th>القيمة</th></tr></thead>
          <tbody>
            {list.length === 0 && <tr><td colSpan={5} className="text-center text-slate-400 py-8">لا توجد أصناف</td></tr>}
            {list.map(m => {
              const d = daysUntil(m.expiry);
              return (
                <tr key={m.id} className={d !== null && d < 0 ? 'bg-red-50' : ''}>
                  <td className="font-medium">{m.nameAr}</td>
                  <td>{m.quantity}</td>
                  <td>{fmtDate(m.expiry)}</td>
                  <td className={d !== null && d < 0 ? 'text-red-600 font-bold' : 'text-amber-600'}>
                    {d === null ? '-' : d < 0 ? `منتهية منذ ${Math.abs(d)} يوم` : `${d} يوم`}
                  </td>
                  <td className="font-semibold">{fmtMoney((m.quantity||0)*(m.purchasePrice||0))}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Interactions() {
  const [meds] = useMedicines();
  const [a, setA] = useState('');
  const [b, setB] = useState('');
  const m1 = meds.find(m => m.id === +a);
  const m2 = meds.find(m => m.id === +b);
  const warnings = (m1 && m2) ? checkInteractions([m1, m2]) : [];

  return (
    <div className="space-y-4">
      <div className="card p-5">
        <h3 className="font-bold mb-4">فحص التضارب بين دوائين</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          <select className="input" value={a} onChange={e=>setA(e.target.value)}>
            <option value="">-- اختر الدواء الأول --</option>
            {meds.map(m => <option key={m.id} value={m.id}>{m.nameAr} ({m.activeIngredient})</option>)}
          </select>
          <select className="input" value={b} onChange={e=>setB(e.target.value)}>
            <option value="">-- اختر الدواء الثاني --</option>
            {meds.map(m => <option key={m.id} value={m.id}>{m.nameAr} ({m.activeIngredient})</option>)}
          </select>
        </div>
        {m1 && m2 && warnings.length === 0 && (
          <div className="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg text-green-800">
            ✓ لا يوجد تضارب معروف بين <b>{m1.nameAr}</b> و <b>{m2.nameAr}</b>
          </div>
        )}
        {warnings.map((w, i) => (
          <div key={i} className={`mt-4 p-4 rounded-lg border ${severityInfo[w.severity].color}`}>
            <div className="font-bold mb-2">{severityInfo[w.severity].label}: {w.med1.nameAr} + {w.med2.nameAr}</div>
            <div className="text-sm mb-1"><b>الآلية:</b> {w.mechanism}</div>
            <div className="text-sm"><b>التوصية:</b> {w.note}</div>
          </div>
        ))}
      </div>

      <div className="card p-5">
        <h3 className="font-bold mb-3">قاعدة التضاربات المدمجة ({SEED_INTERACTIONS.length} تفاعل)</h3>
        <div className="overflow-auto">
          <table className="table-base text-xs">
            <thead><tr><th>المادة الأولى</th><th>المادة الثانية</th><th>الشدة</th><th>الآلية</th></tr></thead>
            <tbody>
              {SEED_INTERACTIONS.map((x,i) => (
                <tr key={i}>
                  <td className="font-mono">{x.a}</td>
                  <td className="font-mono">{x.b}</td>
                  <td><span className={`badge ${x.severity === 'severe' ? 'badge-red' : x.severity === 'moderate' ? 'badge-yellow' : 'badge-blue'}`}>{severityInfo[x.severity].label}</span></td>
                  <td className="text-xs">{x.mechanism}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function Sales() {
  const [sales] = useSales();
  const sorted = [...sales].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  const total = sorted.reduce((s,x) => s + (x.total||0), 0);
  const profit = sorted.reduce((s,x) => s + (x.profit||0), 0);

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div className="card p-5"><div className="text-xs text-slate-500">عدد الفواتير</div><div className="text-2xl font-bold mt-1">{sorted.length}</div></div>
        <div className="card p-5"><div className="text-xs text-slate-500">إجمالي المبيعات</div><div className="text-2xl font-bold mt-1">{fmtMoney(total)}</div></div>
        <div className="card p-5"><div className="text-xs text-slate-500">إجمالي الأرباح</div><div className="text-2xl font-bold mt-1 text-brand-600">{fmtMoney(profit)}</div></div>
      </div>
      <div className="card overflow-auto">
        <table className="table-base">
          <thead><tr><th>رقم</th><th>التاريخ</th><th>العميل</th><th>عدد الأصناف</th><th>الإجمالي</th><th>الربح</th></tr></thead>
          <tbody>
            {sorted.length === 0 && <tr><td colSpan={6} className="text-center text-slate-400 py-8">لا توجد مبيعات</td></tr>}
            {sorted.map(s => (
              <tr key={s.id}>
                <td className="font-mono">#{s.id}</td>
                <td className="text-xs">{new Date(s.createdAt).toLocaleString('en-CA')}</td>
                <td>{s.customer}</td>
                <td>{(s.items||[]).length}</td>
                <td className="font-semibold">{fmtMoney(s.total)}</td>
                <td className="text-brand-600">{fmtMoney(s.profit)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Assistant() {
  const [messages, setMessages] = useState([
    { role: 'assistant', content: 'أهلاً! أنا مساعدك الصيدلاني. اسألني عن جرعة دواء، تفاعلات، أعراض جانبية، أو نصائح لحالات شائعة. بلهجتك المحلية أو الفصحى.' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    const newMessages = [...messages, { role: 'user', content: text }];
    setMessages(newMessages);
    setInput(''); setLoading(true);
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: newMessages.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const contentType = res.headers.get('content-type') || '';
      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText.slice(0, 200) || ('HTTP ' + res.status));
      }
      if (!contentType.includes('json')) {
        throw new Error('المساعد غير مفعّل. انشر النظام على Cloudflare Pages وأضف ANTHROPIC_API_KEY في Environment variables.');
      }
      const data = await res.json();
      const reply = data.content || data.reply || data.message || '';
      setMessages(m => [...m, { role: 'assistant', content: reply || 'لم أستطع توليد رد.' }]);
    } catch (err) {
      setMessages(m => [...m, { role: 'assistant', content: '⚠ ' + err.message, error: true }]);
    } finally {
      setLoading(false);
    }
  };

  const examples = [
    'شنو جرعة باراسيتامول للطفل عمره 5 سنين؟',
    'هل ممكن آخذ بروفين ويا وارفارين؟',
    'مريض يشتكي من حرقة معدة، شنو تنصح؟',
    'ما الفرق بين أموكسيسيلين وأزيثرومايسين؟'
  ];

  return (
    <div className="card h-[70vh] flex flex-col">
      <div className="p-4 border-b">
        <h3 className="font-bold">المساعد الذكي (Claude)</h3>
        <div className="text-xs text-slate-500">مساعد صيدلاني ذكي يجيب على أسئلتك بلهجة محلية</div>
      </div>
      <div className="flex-1 overflow-auto p-4 space-y-3">
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.role === 'user' ? 'justify-start' : 'justify-end'}`}>
            <div className={`max-w-[85%] p-3 rounded-xl whitespace-pre-wrap text-sm ${
              m.role === 'user' ? 'bg-brand-600 text-white' :
              m.error ? 'bg-red-50 text-red-700 border border-red-200' :
              'bg-slate-100 text-slate-800'
            }`}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div className="flex justify-end">
            <div className="bg-slate-100 p-3 rounded-xl text-sm text-slate-400">جاري التفكير...</div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      {messages.length <= 1 && (
        <div className="px-4 pb-2 flex flex-wrap gap-2">
          {examples.map((ex, i) => (
            <button key={i} onClick={() => setInput(ex)} className="text-xs px-3 py-1.5 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600">
              {ex}
            </button>
          ))}
        </div>
      )}
      <div className="p-3 border-t flex gap-2">
        <input
          className="input flex-1"
          placeholder="اكتب سؤالك..."
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          disabled={loading}
        />
        <button onClick={send} disabled={loading || !input.trim()} className="btn btn-primary disabled:opacity-50">
          إرسال
        </button>
      </div>
    </div>
  );
}

function Settings() {
  const exportData = async () => {
    const data = {
      medicines: await db.medicines.toArray(),
      sales: await db.sales.toArray(),
      exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `pharmacy-backup-${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
    toast('تم التصدير', 'success');
  };
  const importData = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (!confirm('استيراد سيحذف البيانات الحالية. متابعة؟')) return;
        await db.medicines.clear();
        await db.sales.clear();
        if (data.medicines) await db.medicines.bulkAdd(data.medicines);
        if (data.sales) await db.sales.bulkAdd(data.sales);
        toast('تم الاستيراد', 'success');
        setTimeout(() => location.reload(), 500);
      } catch (err) { toast('ملف غير صالح', 'error'); }
    };
    reader.readAsText(file);
  };
  const reset = async () => {
    if (!confirm('حذف كل البيانات وإعادة التشغيل؟')) return;
    await db.medicines.clear(); await db.sales.clear();
    location.reload();
  };

  return (
    <div className="space-y-4 max-w-2xl">
      <div className="card p-5">
        <h3 className="font-bold mb-3">النسخ الاحتياطي</h3>
        <div className="flex gap-2 flex-wrap">
          <button onClick={exportData} className="btn btn-primary">تصدير JSON</button>
          <label className="btn btn-ghost cursor-pointer">
            استيراد JSON
            <input type="file" accept=".json" className="hidden" onChange={importData}/>
          </label>
          <button onClick={reset} className="btn btn-danger">إعادة تعيين</button>
        </div>
      </div>

      <div className="card p-5">
        <h3 className="font-bold mb-3">عن النظام</h3>
        <div className="text-sm text-slate-600 space-y-2">
          <p>نسخة HTML واحدة — تعمل محلياً في متصفحك بدون خادم. البيانات محفوظة في IndexedDB.</p>
          <p>للحصول على المساعد الذكي (Claude) والمحاسبة الكاملة والـ QR scanner، استخدم النسخة الكاملة المنشورة على Cloudflare Pages.</p>
          <p className="text-xs text-slate-400 pt-2">⚠ إخلاء مسؤولية طبي: هذا النظام أداة مساعدة فقط. القرار الصيدلاني النهائي مسؤولية الصيدلي المرخّص.</p>
        </div>
      </div>
    </div>
  );
}

  { k: 'dashboard',    label: 'لوحة التحكم',    icon: '📊' },

  { k: 'expiry',       label: 'الصلاحية',       icon: '⏰' },
  { k: 'interactions', label: 'التضارب الدوائي', icon: '⚠' },
  { k: 'assistant',    label: 'المساعد الذكي',  icon: '🤖' },

];

  const Page = { dashboard: Dashboard, pos: POS, medicines: Medicines, sales: Sales, expiry: Expiry, interactions: Interactions, assistant: Assistant, settings: Settings }[tab];

  return (
    <div className="min-h-screen">
      <Toasts/>
      <header className="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-brand-600 text-white flex items-center justify-center text-xl font-bold">ص</div>
          <div>
            <h1 className="font-bold text-slate-900">نظام الصيدلية الذكي</h1>

          </div>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
